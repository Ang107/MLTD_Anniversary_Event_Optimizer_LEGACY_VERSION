name: Deploy branch preview to Pages

on:
  push:
    branches-ignore: [gh-pages]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site directory
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='video' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            ./ _site/
          touch _site/.nojekyll

      - name: Compute destination directory
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "dest=." >> "$GITHUB_OUTPUT"
          else
            echo "dest=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: ${{ steps.vars.outputs.dest }}
          keep_files: true
