name: Deploy branch preview to Pages

on:
  push:
    branches-ignore: [gh-pages]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site directory
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='video' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            ./ _site/
          touch _site/.nojekyll

      - name: Compute destination directory
        id: vars
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ "$BRANCH_NAME" = "main" ]; then
            dest="."
          else
            dest="$BRANCH_NAME"
          fi
          {
            echo "dest<<EOF"
            echo "$dest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: ${{ steps.vars.outputs.dest }}
          keep_files: true
